<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DNA BAR — メニュー編集</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');
:root{
  --black:#060606;--dark:#0d0d0d;--dark2:#141414;--dark3:#1c1c1c;
  --gold:#c8a230;--gold2:#e8c050;--gold-dim:rgba(200,162,48,.12);
  --white:#f0ece4;--gray:#6a6660;--gray2:#2a2a2a;
  --red:#c0392b;--red-dim:rgba(192,57,43,.12);
  --green:#1a7a42;--green2:#25a85a;
  --border:rgba(200,162,48,.18);--border2:rgba(200,162,48,.4);
  --r:10px
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans JP',sans-serif;background:var(--black);color:var(--white);min-height:100vh}

/* ===== SCREEN ===== */
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

/* ===== LOGIN ===== */
.login-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:24px}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.3em;color:var(--gold2);text-align:center}
.login-sub{font-size:12px;color:var(--gray);letter-spacing:.2em;text-align:center}
.role-btns{display:flex;gap:12px;width:100%;max-width:320px}
.role-btn{
  flex:1;padding:18px 12px;border-radius:var(--r);border:1.5px solid var(--border);
  background:var(--dark2);font-family:'Bebas Neue',sans-serif;font-size:16px;
  letter-spacing:.18em;cursor:pointer;transition:all .15s;text-align:center;color:var(--gray)
}
.role-btn.selected{border-color:var(--gold);background:var(--gold-dim);color:var(--gold2)}
.role-btn:active{transform:scale(.96)}
.role-icon{font-size:28px;display:block;margin-bottom:6px}
.pin-label{font-size:10px;color:var(--gold);letter-spacing:.18em;font-weight:700;text-align:center}
.pin-dots{display:flex;gap:10px;justify-content:center;margin:8px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;background:var(--dark3);border:1.5px solid var(--border);transition:all .15s}
.pin-dot.filled{background:var(--gold);border-color:var(--gold)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:280px}
.pin-key{
  padding:16px;border-radius:10px;border:1px solid var(--border);background:var(--dark2);
  color:var(--white);font-family:'DM Mono',monospace;font-size:22px;font-weight:500;
  cursor:pointer;transition:all .15s;text-align:center;min-height:60px
}
.pin-key:active{background:var(--gold-dim);border-color:var(--gold);transform:scale(.94)}
.login-error{font-size:13px;color:#e07060;text-align:center;min-height:20px;letter-spacing:.06em}

/* ===== HEADER ===== */
header{
  background:var(--dark);border-bottom:1px solid var(--border);
  height:54px;display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;flex-shrink:0;position:sticky;top:0;z-index:10
}
.hdr-logo{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.2em;color:var(--gold2)}
.hdr-right{display:flex;align-items:center;gap:10px}
.hdr-role{font-size:10px;color:var(--gray);background:var(--dark3);border:1px solid var(--border);padding:3px 10px;border-radius:12px;letter-spacing:.1em}
.hdr-save-btn{
  padding:7px 14px;border-radius:7px;border:none;background:var(--gold);
  color:var(--black);font-family:'Bebas Neue',sans-serif;font-size:14px;
  letter-spacing:.12em;cursor:pointer;min-height:36px
}
.hdr-save-btn:active{transform:scale(.95)}
.logout-btn{font-size:11px;color:var(--gray);background:none;border:1px solid var(--gray2);padding:5px 10px;border-radius:6px;cursor:pointer;font-family:'Noto Sans JP',sans-serif}

/* ===== EDITOR ===== */
.editor-wrap{flex:1;padding:14px;max-width:640px;margin:0 auto;width:100%}
.save-status{font-size:12px;text-align:center;padding:8px;color:var(--gray);min-height:32px}

/* ===== SECTION ===== */
.sec{background:var(--dark2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.sec-head{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.15em;color:var(--gold2);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sec-head-icon{font-size:18px;margin-right:6px}

/* ===== ITEM CARD ===== */
.item-card{background:var(--dark3);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px}
.item-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.item-name-disp{font-size:13px;font-weight:700;color:var(--white)}

/* ===== FORM ===== */
label{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.15em;display:block;margin:10px 0 4px;text-transform:uppercase}
input[type=text],input[type=number],textarea{
  width:100%;padding:11px 13px;font-size:15px;border:1.5px solid var(--border);border-radius:8px;
  background:var(--dark2);color:var(--white);font-family:'Noto Sans JP',sans-serif;
  outline:none;transition:border .15s;min-height:46px
}
input:focus,textarea:focus{border-color:var(--gold)}
input::placeholder,textarea::placeholder{color:var(--gray2)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ===== EMOJI PICKER ===== */
.emoji-wrap{position:relative;display:inline-block}
.emoji-trigger{
  width:52px;height:52px;border-radius:8px;border:1.5px solid var(--border);
  background:var(--dark2);font-size:26px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s
}
.emoji-trigger:active{border-color:var(--gold);background:var(--gold-dim)}
.emoji-popup{
  position:fixed;z-index:500;background:var(--dark2);border:1px solid var(--border2);
  border-radius:10px;padding:10px;width:260px;box-shadow:0 8px 24px rgba(0,0,0,.6);display:none
}
.emoji-popup.show{display:block}
.ep-label{font-size:9px;color:var(--gold);letter-spacing:.15em;font-weight:700;margin:6px 0 4px}
.ep-grid{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.ep-btn{width:34px;height:34px;border-radius:6px;border:1px solid var(--border);background:var(--dark3);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ep-btn:active{background:var(--gold-dim);border-color:var(--gold)}

/* ===== BUTTONS ===== */
.btn-gold{width:100%;padding:13px;border-radius:var(--r);border:none;background:var(--gold);color:var(--black);font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.15em;cursor:pointer;min-height:50px}
.btn-gold:active{transform:scale(.97)}
.btn-add{display:flex;align-items:center;justify-content:center;gap:6px;padding:13px;border:1.5px dashed var(--border);border-radius:var(--r);font-size:13px;color:var(--gray);cursor:pointer;background:none;width:100%;margin-top:8px;font-family:'Noto Sans JP',sans-serif;font-weight:700;min-height:48px}
.btn-add:active{border-color:var(--gold);color:var(--gold)}
.btn-del{font-size:11px;color:#e07060;background:none;border:1px solid rgba(192,57,43,.3);padding:5px 10px;border-radius:6px;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.btn-del:active{background:var(--red-dim)}

/* ===== NOMIHODAI ===== */
.nomi-card{background:var(--dark3);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px}

/* ===== TOAST ===== */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--gold);color:var(--black);padding:10px 22px;border-radius:20px;font-size:13px;font-weight:700;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:380px){
  .pin-key{padding:13px;font-size:20px;min-height:52px}
  .role-btn{padding:14px 8px;font-size:14px}
}
</style>
</head>
<body>
<div id="toast"></div>

<!-- ===== LOGIN SCREEN ===== -->
<div class="screen active" id="screen-login">
  <div class="login-wrap">
    <div>
      <div class="login-logo">◆ DNA BAR</div>
      <div class="login-sub" style="margin-top:4px">MENU EDITOR</div>
    </div>
    <div class="role-btns">
      <button class="role-btn" id="role-admin" onclick="selectRole('admin')">
        <span class="role-icon">👑</span>管理者
      </button>
      <button class="role-btn" id="role-owner" onclick="selectRole('owner')">
        <span class="role-icon">🍺</span>DNAオーナー
      </button>
    </div>
    <div style="width:100%;max-width:280px;display:flex;flex-direction:column;align-items:center;gap:12px">
      <div class="pin-label">4桁PINを入力</div>
      <div class="pin-dots" id="pin-dots">
        <div class="pin-dot"></div><div class="pin-dot"></div>
        <div class="pin-dot"></div><div class="pin-dot"></div>
      </div>
      <div class="login-error" id="login-error"></div>
      <div class="pin-pad" id="pin-pad"></div>
    </div>
  </div>
</div>

<!-- ===== EDITOR SCREEN ===== -->
<div class="screen" id="screen-editor">
  <header>
    <div class="hdr-logo">◆ MENU EDITOR</div>
    <div class="hdr-right">
      <span class="hdr-role" id="hdr-role">—</span>
      <button class="hdr-save-btn" onclick="saveToFirebase()">🔥 保存</button>
      <button class="logout-btn" onclick="logout()">ログアウト</button>
    </div>
  </header>
  <div class="editor-wrap">
    <div class="save-status" id="save-status"></div>
    <div id="menu-editor-body"></div>
    <div id="nomi-editor-body" style="margin-top:4px"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
// ===== Firebase =====
let db = null;
window.addEventListener('load', () => {
  firebase.initializeApp({
    apiKey: 'AIzaSyCxLwJZKjbo-ucomVbAD1_LJxhL5SSYDpc',
    databaseURL: 'https://dna-wallet-57c0a-default-rtdb.firebaseio.com',
    appId: '1:499466077674:web:c0fffd682b9bb4008a1e93'
  });
  db = firebase.database();
  // PINがなければデフォルトをセット
  db.ref('/editor_pins').once('value', snap => {
    if (!snap.val()) {
      db.ref('/editor_pins').set({ admin: '1234', owner: '0000' });
    }
  });
});

// ===== STATE =====
let currentRole = 'admin';
let pinBuffer = '';
let menuCats = [];
let nomihodai = [];
let nomiNote = '';

// ===== DEFAULT MENU =====
const DEFAULT_MENU = [
  {name:'カクテル（ALL 600円）',icon:'🍸',note:'ALL 600円',items:[
    {name:'ジントニック',price:600,desc:'ジンベース',icon:'🍸',img:''},
    {name:'ジンバック',price:600,desc:'ジンベース',icon:'🍸',img:''},
    {name:'ジンリッキー',price:600,desc:'ジンベース',icon:'🍸',img:''},
    {name:'ジンライム',price:600,desc:'ジンベース',icon:'🍋',img:''},
    {name:'モスコミュール',price:600,desc:'ウォッカベース',icon:'🫚',img:''},
    {name:'スクリュードライバー',price:600,desc:'ウォッカベース',icon:'🍊',img:''},
    {name:'ブルドッグ',price:600,desc:'ウォッカベース',icon:'🍇',img:''},
    {name:'ウォッカトニック',price:600,desc:'ウォッカベース',icon:'🫧',img:''},
    {name:'キューバリブレ',price:600,desc:'ラムベース',icon:'🥤',img:''},
    {name:'ラムバック',price:600,desc:'ラムベース',icon:'🍹',img:''},
    {name:'ラムトニック',price:600,desc:'ラムベース',icon:'🫧',img:''},
    {name:'ハイボール',price:600,desc:'ウイスキーベース',icon:'🥃',img:''},
    {name:'ジンジャーハイボール',price:600,desc:'ウイスキーベース',icon:'🌶️',img:''},
    {name:'コークハイ',price:600,desc:'ウイスキーベース',icon:'🥃',img:''},
    {name:'レッドアイ',price:600,desc:'ビールベース',icon:'🍅',img:''},
    {name:'シャンディガフ',price:600,desc:'ビールベース',icon:'🍺',img:''},
  ]},
  {name:'単品 アルコール（ALL 500円）',icon:'🍺',note:'ALL 500円',items:[
    {name:'ビール',price:500,desc:'',icon:'🍺',img:''},
    {name:'ハイボール',price:500,desc:'',icon:'🥃',img:''},
    {name:'レモンサワー',price:500,desc:'',icon:'🍋',img:''},
    {name:'グレープフルーツサワー',price:500,desc:'',icon:'🍊',img:''},
    {name:'ウーロンハイ',price:500,desc:'',icon:'🫖',img:''},
    {name:'緑茶ハイ',price:500,desc:'',icon:'🍵',img:''},
    {name:'焼酎',price:500,desc:'',icon:'🍶',img:''},
    {name:'ウイスキー',price:500,desc:'',icon:'🥃',img:''},
  ]},
  {name:'単品 ノンアルコール（ALL 500円）',icon:'🥤',note:'ALL 500円',items:[
    {name:'カルピス',price:500,desc:'',icon:'🥛',img:''},
    {name:'コーラ',price:500,desc:'',icon:'🥤',img:''},
    {name:'ジンジャーエール',price:500,desc:'',icon:'🫧',img:''},
    {name:'オレンジジュース',price:500,desc:'',icon:'🍊',img:''},
    {name:'グレープフルーツジュース',price:500,desc:'',icon:'🍊',img:''},
    {name:'ウーロン茶',price:500,desc:'',icon:'🫖',img:''},
    {name:'緑茶',price:500,desc:'',icon:'🍵',img:''},
  ]},
  {name:'フード',icon:'🍔',note:'',items:[
    {name:'ホットドッグ',price:500,desc:'HOT DOG',icon:'🌭',img:''},
    {name:'スパイシーチリドッグ Lv.1',price:650,desc:'辛さ控えめ',icon:'🌶️',img:''},
    {name:'スパイシーチリドッグ Lv.2',price:750,desc:'中辛',icon:'🌶️',img:''},
    {name:'スパイシーチリドッグ Lv.3',price:850,desc:'激辛',icon:'🔥',img:''},
    {name:'えだまめ',price:300,desc:'日替りフード',icon:'🫘',img:''},
    {name:'チリチップス',price:400,desc:'日替りフード',icon:'🌮',img:''},
    {name:'おつまみピーナッツ',price:100,desc:'日替りフード',icon:'🥜',img:''},
    {name:'顆粒カシン',price:100,desc:'飲む前に飲む!!',icon:'💊',img:''},
  ]},
  {name:'SHOT / BOM',icon:'🥃',note:'',items:[
    {name:'SHOT',price:300,desc:'※飲み放題対象外',icon:'🥃',img:''},
    {name:'BOM',price:500,desc:'※飲み放題対象外',icon:'💣',img:''},
  ]},
];
const DEFAULT_NOMI = [
  {name:'飲み放題（ビールなし）',price:2500,duration:90,note:''},
  {name:'飲み放題（ビールあり）',price:3000,duration:90,note:'グラス交換制。SHOTは対象外。'},
];

// ===== EMOJI =====
const EMOJI_SETS = [
  {label:'グラス',emojis:['🍸','🍹','🥂','🍷','🥃','🍶','🫗','🧉','🥛','🍵','☕']},
  {label:'ビール',emojis:['🍺','🍻','🥤','🧃','🧋','🫖']},
  {label:'フルーツ',emojis:['🍋','🍊','🍇','🍓','🍒','🍑','🥭','🍍','🥥','🍈','🫐','🍌','🍎']},
  {label:'フード',emojis:['🌭','🍔','🍟','🍕','🌮','🌯','🥗','🥜','🫘','🌶️','🔥','🧀','🥒','🧅','🧄','🍛','🥗','💊']},
  {label:'その他',emojis:['✨','⭐','🌙','❄️','💎','🎵','🪄','🌿','🫚','🫧','🍅','💣']},
];
let activePopup = null;

function openEmojiPicker(triggerEl, callback) {
  closeEmojiPicker();
  const popup = document.createElement('div');
  popup.className = 'emoji-popup show';
  popup.innerHTML = EMOJI_SETS.map(s =>
    `<div class="ep-label">${s.label}</div>
    <div class="ep-grid">${s.emojis.map(e =>
      `<button class="ep-btn" onclick="pickEmoji('${e}')">${e}</button>`
    ).join('')}</div>`
  ).join('');
  document.body.appendChild(popup);
  activePopup = {el: popup, cb: callback};
  // 位置調整
  const r = triggerEl.getBoundingClientRect();
  popup.style.left = Math.min(r.left, window.innerWidth - 270) + 'px';
  popup.style.top = (r.bottom + 6) + 'px';
  setTimeout(() => document.addEventListener('click', closeEmojiPickerOutside, {once:true}), 0);
}
function pickEmoji(e) {
  if (activePopup) { activePopup.cb(e); closeEmojiPicker(); }
}
function closeEmojiPicker() {
  if (activePopup) { activePopup.el.remove(); activePopup = null; }
}
function closeEmojiPickerOutside(ev) {
  if (!ev.target.closest('.emoji-popup') && !ev.target.closest('.emoji-trigger')) closeEmojiPicker();
}

// ===== LOGIN =====
function selectRole(role) {
  currentRole = role;
  pinBuffer = '';
  document.getElementById('login-error').textContent = '';
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('role-' + role).classList.add('selected');
  updatePinDots();
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function buildPinPad() {
  const pad = document.getElementById('pin-pad');
  pad.innerHTML = [7,8,9,4,5,6,1,2,3,'',0,'⌫'].map(k =>
    k === '' ? '<div></div>' :
    `<button class="pin-key" onclick="pinInput('${k}')">${k}</button>`
  ).join('');
}

function updatePinDots() {
  document.querySelectorAll('.pin-dot').forEach((d,i) =>
    d.classList.toggle('filled', i < pinBuffer.length));
}

function pinInput(k) {
  document.getElementById('login-error').textContent = '';
  if (k === '⌫') { pinBuffer = pinBuffer.slice(0,-1); updatePinDots(); return; }
  if (pinBuffer.length >= 4) return;
  pinBuffer += k;
  updatePinDots();
  if (pinBuffer.length === 4) setTimeout(checkPin, 150);
}

function checkPin() {
  if (!db) { showError('Firebase未接続。少し待ってください。'); return; }
  db.ref('/editor_pins').once('value', snap => {
    const pins = snap.val() || { admin: '0000', owner: '1234' };
    const correct = pins[currentRole];
    if (pinBuffer === correct) {
      loginSuccess();
    } else {
      showError('PINが違います');
      pinBuffer = '';
      updatePinDots();
    }
  });
}

function showError(msg) {
  document.getElementById('login-error').textContent = msg;
}

function loginSuccess() {
  document.getElementById('hdr-role').textContent = currentRole === 'admin' ? '👑 管理者' : '🍺 DNAオーナー';
  showScreen('editor');
  loadMenu();
}

function logout() {
  pinBuffer = '';
  updatePinDots();
  document.getElementById('login-error').textContent = '';
  showScreen('login');
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

// ===== LOAD MENU FROM FIREBASE =====
function loadMenu() {
  if (!db) return;
  db.ref('/menu').once('value', snap => {
    const data = snap.val();
    if (data && data.cats && data.cats.length) {
      menuCats = JSON.parse(JSON.stringify(data.cats));
      nomihodai = data.nomihodai ? JSON.parse(JSON.stringify(data.nomihodai)) : JSON.parse(JSON.stringify(DEFAULT_NOMI));
      nomiNote = data.nomiNote || '';
    } else {
      menuCats = JSON.parse(JSON.stringify(DEFAULT_MENU));
      nomihodai = JSON.parse(JSON.stringify(DEFAULT_NOMI));
    }
    renderEditor();
  });
}

// ===== RENDER EDITOR =====
function renderEditor() {
  renderMenuEditor();
  renderNomiEditor();
}

function renderMenuEditor() {
  const body = document.getElementById('menu-editor-body');
  body.innerHTML = menuCats.map((cat, ci) => `
    <div class="sec">
      <div class="sec-head">
        <span><span class="sec-head-icon">${esc(cat.icon)}</span>${esc(cat.name)}</span>
      </div>
      <!-- カテゴリ設定 -->
      <div class="row2" style="margin-bottom:10px">
        <div>
          <label>カテゴリ名</label>
          <input type="text" value="${esc(cat.name)}" onchange="menuCats[${ci}].name=this.value;renderMenuEditor()" placeholder="例：カクテル">
        </div>
        <div>
          <label>均一価格表示</label>
          <input type="text" value="${esc(cat.note||'')}" onchange="menuCats[${ci}].note=this.value" placeholder="例：ALL 600円">
        </div>
      </div>
      <!-- アイテム一覧 -->
      <div id="items-${ci}"></div>
      <button class="btn-add" onclick="addItem(${ci})">＋ ドリンクを追加</button>
    </div>
  `).join('');
  // 各カテゴリのアイテムをレンダリング
  menuCats.forEach((cat, ci) => renderItems(ci));
}

function renderItems(ci) {
  const container = document.getElementById('items-' + ci);
  if (!container) return;
  const cat = menuCats[ci];
  container.innerHTML = cat.items.map((it, ii) => `
    <div class="item-card">
      <div class="item-card-head">
        <span class="item-name-disp">${esc(it.icon||'🍸')} ${esc(it.name)||'（名前未入力）'}</span>
        <button class="btn-del" onclick="removeItem(${ci},${ii})">削除</button>
      </div>
      <div style="display:flex;gap:10px;align-items:flex-start">
        <div>
          <label>アイコン</label>
          <button class="emoji-trigger" id="et-${ci}-${ii}" onclick="openEmojiPicker(this,e=>setIcon(${ci},${ii},e))">${esc(it.icon||'🍸')}</button>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;gap:4px">
          <label>ドリンク名</label>
          <input type="text" value="${esc(it.name)}" onchange="menuCats[${ci}].items[${ii}].name=this.value;renderItems(${ci})" placeholder="例：ジントニック">
          <label>説明</label>
          <input type="text" value="${esc(it.desc||'')}" onchange="menuCats[${ci}].items[${ii}].desc=this.value" placeholder="例：ジンベース">
          <label>価格（円）</label>
          <input type="number" value="${it.price||''}" onchange="menuCats[${ci}].items[${ii}].price=parseInt(this.value)||0" placeholder="600" inputmode="numeric">
        </div>
      </div>
    </div>
  `).join('');
}

function setIcon(ci, ii, emoji) {
  menuCats[ci].items[ii].icon = emoji;
  renderItems(ci);
}

function addItem(ci) {
  menuCats[ci].items.push({name:'',price:0,desc:'',icon:'🍸',img:''});
  renderItems(ci);
}

function removeItem(ci, ii) {
  if (!confirm('削除しますか？')) return;
  menuCats[ci].items.splice(ii, 1);
  renderItems(ci);
}

// ===== NOMIHODAI EDITOR =====
function renderNomiEditor() {
  const body = document.getElementById('nomi-editor-body');
  body.innerHTML = `
    <div class="sec">
      <div class="sec-head">🍻 飲み放題プラン</div>
      <div id="nomi-list"></div>
      <button class="btn-add" onclick="addNomi()">＋ プランを追加</button>
      <label style="margin-top:12px">共通注記</label>
      <input type="text" id="nomi-note-inp" value="${esc(nomiNote)}" placeholder="例：グラス交換制。SHOTは対象外。" onchange="nomiNote=this.value">
    </div>`;
  renderNomiList();
}

function renderNomiList() {
  const list = document.getElementById('nomi-list');
  if (!list) return;
  list.innerHTML = nomihodai.map((p, i) => `
    <div class="nomi-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:13px;font-weight:700;color:var(--white)">${esc(p.name)||'プラン'+(i+1)}</span>
        <button class="btn-del" onclick="removeNomi(${i})">削除</button>
      </div>
      <div class="row2">
        <div>
          <label>プラン名</label>
          <input type="text" value="${esc(p.name)}" onchange="nomihodai[${i}].name=this.value;renderNomiList()" placeholder="飲み放題（ビールあり）">
        </div>
        <div>
          <label>価格（円）</label>
          <input type="number" value="${p.price||''}" onchange="nomihodai[${i}].price=parseInt(this.value)||0" placeholder="3000" inputmode="numeric">
        </div>
      </div>
      <div class="row2" style="margin-top:4px">
        <div>
          <label>時間（分）</label>
          <input type="number" value="${p.duration||90}" onchange="nomihodai[${i}].duration=parseInt(this.value)||90" placeholder="90" inputmode="numeric">
        </div>
        <div>
          <label>メモ</label>
          <input type="text" value="${esc(p.note||'')}" onchange="nomihodai[${i}].note=this.value" placeholder="グラス交換制など">
        </div>
      </div>
    </div>`).join('');
}

function addNomi() {
  nomihodai.push({name:'',price:0,duration:90,note:''});
  renderNomiList();
}
function removeNomi(i) {
  if (!confirm('削除しますか？')) return;
  nomihodai.splice(i,1);
  renderNomiList();
}

// ===== SAVE TO FIREBASE =====
function saveToFirebase() {
  if (!db) { toast('Firebase未接続'); return; }
  const status = document.getElementById('save-status');
  status.textContent = '⏳ 保存中...';
  status.style.color = 'var(--gold)';
  const data = {
    cats: menuCats,
    nomihodai: nomihodai,
    nomiNote: nomiNote,
    updatedAt: Date.now(),
    updatedBy: currentRole
  };
  db.ref('/menu').set(data, err => {
    if (err) {
      status.textContent = '❌ 保存失敗: ' + err.message;
      status.style.color = '#e07060';
      toast('❌ 保存失敗');
    } else {
      const t = new Date().toLocaleTimeString('ja-JP');
      status.textContent = '✅ ' + t + ' 保存完了 — order.htmlに即反映されました';
      status.style.color = 'var(--green2)';
      toast('✅ Firebaseに保存しました');
    }
  });
}

// ===== TOAST =====
let tTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(tTimer);
  tTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

// ===== INIT =====
buildPinPad();
selectRole('admin');
</script>
</body>
